# La griglia di screening: soglie e pesi. È il "cervello" decisionale.
# scorer.py legge questo file (CLAUDE.md §3.3, §5). Il razionale — PERCHÉ questi
# valori — vive in research/scoring.md, non qui.
#
# Obiettivo (DECISO 2026-07-05): flip = rivendita entro 5 anni. La griglia si
# specializza sul margine di rivendita, non sul reddito da locazione (research/scoring.md).
obiettivo: flip

# Soglie hard DECISE con l'utente il 2026-07-05 → la griglia è operativa sui
# criteri hard. Pesi soft e zone A/B/C ancora da rifinire (vedi sotto).
tarato: true

# --- Criteri HARD (gate binari: se falliti, scarto silenzioso) ---
hard:
  # Sconto minimo del prezzo base sul valore di stima peritale.
  # 0.25 = prezzo base almeno 25% sotto la stima.
  sconto_min_su_stima: 0.25

  # Tetto massimo di prezzo base d'asta (filtro economico di Livello 1).
  prezzo_base_max: 150000

  # Occupazione ammessa. Valori: libero | occupato_debitore | occupato_contratto.
  # Deciso: libero + occupato dal debitore (liberabile). Il contratto opponibile
  # (es. locazione turistica) resta escluso.
  occupazione_ammessa:
    - libero
    - occupato_debitore

  # Solo piena proprietà: esclusi quota di comproprietà, nuda proprietà, usufrutto,
  # diritto di superficie.
  solo_piena_proprieta: true

  # Categorie catastali ammesse: appartamenti e case singole (uso abitativo →
  # vantaggio prezzo-valore, cat. A tranne A/10). Esclusi: A/10 uffici, A/9
  # (castelli/palazzi eminenti), C/* (box/garage/negozi), D/* (alberghi/industriali),
  # terreni. Rivedibile.
  categorie_ammesse:
    - A/1   # abitazioni signorili
    - A/2   # abitazioni civili
    - A/3   # abitazioni economiche
    - A/4   # abitazioni popolari
    - A/5   # abitazioni ultrapopolari
    - A/7   # villini (case singole)
    - A/8   # ville (case singole)
    - A/11  # abitazioni tipiche dei luoghi

  # Abusi/difformità insanabili = scarto hard (CLAUDE.md §11).
  scarta_se_abusi_insanabili: true

  # Filtri dimensionali (mq). null = nessun limite. ANCORA DA DECIDERE con l'utente.
  superficie_mq_min: null      # TODO (utente non ancora deciso)
  superficie_mq_max: null      # TODO

  # Zone ammesse (A/B/C, mappa in research/comuni.md). null = nessun filtro di zona
  # oltre alla geografia (province VE/TV). DA DEFINIRE con l'utente.
  zone_ammesse: null

# --- Punteggio SOFT (ordina i lotti che passano TUTTI i gate hard) ---
# Per il flip il driver è lo sconto sulla stima. Placeholder ragionevoli, da tarare.
soft:
  # Punteggio = normalizzazione dello sconto sopra la soglia (0..1). Più sconto,
  # più in alto. Gli altri pesi entrano quando definiamo zone e margine di flip.
  peso_sconto_su_stima: 1.0

# --- Profondità dell'analisi (DECISO 2026-07-05) ---
# livello 3 (margine di flip) rimandato: richiede prezzo rivendita/mq e costo
# ristrutturazione/mq per zona (assunzioni dell'utente). Per ora ci si ferma
# all'estrazione dati + gate hard + punteggio sconto.
calcola_margine_flip: false
