# Target GEOGRAFICO del radar (CLAUDE.md §3, §8).
#
# DECISIONE PRESA (2026-07-05): il filtro è l'UBICAZIONE DELL'IMMOBILE, NON il
# tribunale. Un'asta gestita da un tribunale qualsiasi (anche Bologna) rientra se
# l'immobile si trova nelle zone target. Sul Portale Vendite Pubbliche questo
# corrisponde alla ricerca immobili per provincia/comune (il tribunale è un dato
# del lotto, non il filtro di ricerca).
#
# Zone target (confermate con l'utente 2026-07-05):
#   - tutta la PROVINCIA di Venezia (VE) — l'utente è cresciuto a Mestre
#   - il COMUNE di Treviso
#   - i comuni della provincia di Treviso limitrofi a VE (elencati sotto, attivi)
#
# NOTA (CLAUDE.md §1.2): i nomi comune vanno usati come compaiono sul PVP.
# Da verificare nello spike PVP che la ricerca accetti esattamente queste stringhe.

geografia:
  # Province prese per intero (tutti i comuni).
  province:
    - sigla: VE
      nome: Venezia
      attivo: true

  # Comuni fuori dalle province sopra, presi singolarmente.
  comuni_extra:
    - nome: Treviso
      provincia: TV
      motivo: "comune capoluogo richiesto esplicitamente"
      attivo: true

    # --- Provincia di Treviso, fascia limitrofa a VE (confermati 2026-07-05) ---
    - nome: Mogliano Veneto
      provincia: TV
      motivo: "confine sud-ovest con VE (Marcon/Venezia)"
      attivo: true
    - nome: Preganziol
      provincia: TV
      motivo: "asse Treviso-Mestre"
      attivo: true
    - nome: Casale sul Sile
      provincia: TV
      motivo: "esempio indicato dall'utente"
      attivo: true
    - nome: Casier
      provincia: TV
      motivo: "limitrofo, area Silea/Sile"
      attivo: true
    - nome: Silea
      provincia: TV
      motivo: "limitrofo lato est di Treviso verso VE"
      attivo: true
    - nome: Zero Branco
      provincia: TV
      motivo: "fascia sud verso VE"
      attivo: true
    - nome: Quinto di Treviso
      provincia: TV
      motivo: "fascia sud-ovest"
      attivo: true

# Tipologie di immobile da intercettare (confermato 2026-07-05: solo residenziale).
# Coerente col flip abitativo e col vantaggio prezzo-valore (cat. A tranne A/10).
# I codici/etichette esatti del PVP vanno mappati nello spike; qui l'intento.
tipologie:
  residenziale: true      # case, appartamenti, ville
  box_garage: false
  commerciale_uffici: false
  terreni: false

# Riferimento microzone e note per comune: research/comuni.md
